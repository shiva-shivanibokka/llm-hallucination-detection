name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eval_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eval_test
      APP_API_TOKEN: test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU torch (keep it off the CUDA wheel)
        run: pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Install backend deps + ruff + pytest
        run: pip install -r backend/requirements.txt ruff pytest
      - name: Lint
        run: ruff check backend
      - name: Test (import in a clean torch-only env; Postgres from the service)
        run: pytest backend -m "not slow"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit
